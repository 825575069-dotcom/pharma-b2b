<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pharma-b2b 手机预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  background: #1a1a2e;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.phone-container {
  position: relative;
  width: 340px;
  height: 680px;
  background: #000;
  border-radius: 44px;
  padding: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 2px #333, 0 0 0 8px #1a1a1a;
  flex-shrink: 0;
}
.phone-screen {
  width: 100%;
  height: 100%;
  border-radius: 32px;
  overflow: hidden;
  background: #fff;
  position: relative;
}
.phone-screen iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
</style>
</head>
<body>
<div class="phone-container">
  <div class="phone-screen">
    <iframe id="phoneFrame" src="/" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
  </div>
</div>
<script>
// 防止 iframe 内页面跳转时把外层手机框带走
(function() {
  var frame = document.getElementById('phoneFrame');
  var originalSrc = '/';
  // 如果外层 URL 被改了（说明 iframe 窴破了 sandbox），强制恢复
  window.addEventListener('beforeunload', function(e) {
    if (window.location.pathname !== '/phone.html') {
      e.preventDefault();
      return '';
    }
  });
  // 监听 hash 变化，确保始终在 phone.html
  if (window.location.pathname !== '/phone.html' && window.location.pathname !== '/') {
    window.location.replace('/phone.html');
  }
})();
</script>
</body>
</html>
