name: Deploy to Server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies and build
        run: |
          # Build mall
          cd frontend/mall
          npm install
          npm run build
          cd ../..

          # Build admin
          cd frontend/admin
          npm install
          npm run build
          cd ../..

          # Build mobile H5
          cd frontend/mobile
          npm install
          npm run build:h5
          cd ../..

          # Build sales H5
          cd frontend/sales
          npm install
          npm run build:h5
          cd ../..

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}
          log-public-key: false

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ $SERVER_USER@$SERVER_HOST:/home/web/pharma-b2b/

      - name: Restart services
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST << 'EOF'
            set -e
            cd /home/web/pharma-b2b

            # Update Nginx configs
            cp deploy/nginx/*.conf /etc/nginx/conf.d/
            nginx -t
            systemctl reload nginx

            # Ensure SSL certificate is deployed (safe to run on every deploy)
            /usr/bin/certbot install --cert-name newb2.gdjztw.com --nginx --redirect --non-interactive 2>/dev/null || true

            # Restart backend
            cd backend
            npm install
            pm2 reload pharma-b2b-api || pm2 start server.js --name pharma-b2b-api
            pm2 save
          EOF
