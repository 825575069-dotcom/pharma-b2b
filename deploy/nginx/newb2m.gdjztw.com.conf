server {
    server_name newb2m.gdjztw.com;
    charset utf-8;
    root /home/web/pharma-b2b/frontend/mobile/dist/build/h5;
    client_max_body_size 100M;
    access_log /var/log/nginx/newb2m.gdjztw.com.access.log;
    error_log  /var/log/nginx/newb2m.gdjztw.com.error.log;

    # Gzip
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_vary on;

    # API proxy to backend
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static assets caching (no immutable, shorter TTL for active development)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|otf|map)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # Mobile H5 SPA
    location / {
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/newb2.gdjztw.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/newb2.gdjztw.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = newb2m.gdjztw.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name newb2m.gdjztw.com;
    return 404; # managed by Certbot


}