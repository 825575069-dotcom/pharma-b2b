server {
    server_name newb2.gdjztw.com;
    charset utf-8;
    client_max_body_size 100M;
    access_log /var/log/nginx/newb2.gdjztw.com.access.log;
    error_log  /var/log/nginx/newb2.gdjztw.com.error.log;

    # Gzip
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_vary on;

    # Admin subpath
    location /admin {
        alias /home/web/pharma-b2b/frontend/admin/dist;
        try_files $uri $uri/ /admin/index.html;
        index index.html;

        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|otf|map)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API proxy to backend (optional convenience)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static assets caching
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|otf|map)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Main mall frontend
    location / {
        root /home/web/pharma-b2b/frontend/mall/dist;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/newb2.gdjztw.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/newb2.gdjztw.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = newb2.gdjztw.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name newb2.gdjztw.com;
    return 404; # managed by Certbot


}